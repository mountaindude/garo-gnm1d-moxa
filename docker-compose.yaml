# docker-compose.yml
version: '3.3'
services:
  emon-allm:
    image: energy-monitor-1:1.0.0
    container_name: energy-mon-servers
    restart: always
    volumes:
      - "./config:/app/config"      # Make config file accessible outside of container
      - "./logs:/app/logs"
    environment:
      - "NODE_ENV=production"           # Read config data from production.yaml 
    logging:
      driver: "json-file"
      options:
        max-file: "5"
        max-size: "5m"
